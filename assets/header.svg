<svg xmlns="http://www.w3.org/2000/svg" width="520" height="120">
  <style>
    @keyframes fade {
      0%, 18% { opacity: 1; }
      22%, 100% { opacity: 0; }
    }
    text {
      font-family: 'Fira Code', 'Cascadia Code', monospace;
      font-weight: 600;
      font-size: 24px;
    }
    .l0 { animation: fade 10s infinite; }
    .l1 { animation: fade 10s infinite; animation-delay: 2s; }
    .l2 { animation: fade 10s infinite; animation-delay: 4s; }
    .l3 { animation: fade 10s infinite; animation-delay: 6s; }
    .l4 { animation: fade 10s infinite; animation-delay: 8s; }
    .sub { font-size: 14px; font-weight: 400; }
  </style>

  <!-- 0xkz1 — blue -->
  <text x="260" y="55" text-anchor="middle" fill="#2563eb" class="l0">🖥️ 0xkz1</text>

  <!-- Creative Technologist — purple -->
  <text x="260" y="55" text-anchor="middle" fill="#a78bfa" class="l1">🜪 Creative Technologist</text>

  <!-- AI Agent Orchestrator — gold (Hermes) -->
  <text x="260" y="55" text-anchor="middle" fill="#f0c040" class="l2">⚡ AI Agent Orchestrator</text>

  <!-- Feral — cyan with subtitle -->
  <g class="l3">
    <text x="260" y="48" text-anchor="middle" fill="#06b6d4">🐍 Feral</text>
    <text x="260" y="68" text-anchor="middle" fill="#06b6d4" class="sub">worlds in collapse</text>
  </g>

  <!-- Artist & Photographer — magenta -->
  <text x="260" y="55" text-anchor="middle" fill="#ec4899" class="l4">📷 Artist &amp; Photographer</text>
</svg>
